# SETUP INSTRUCTIONS
# 1. In your DarkHeart01/DarkHeart01 repo, save this file as:
#    .github/workflows/update-profile-cards.yml
# 2. Commit and push to "main".
# 3. Go to the "Actions" tab -> "Update profile cards" -> "Run workflow" (manual trigger)
#    to generate the files the first time. It also re-runs daily on its own after that.
# 4. Once it finishes (~1-2 min), a "profile/" folder will appear in your repo containing
#    stats.svg, top-langs.svg, trophy.svg, and one pin-*.svg per featured project.
#    The README already points at these local files, so they'll just start working —
#    no more broken icons, because nothing is hotlinked to a live third-party server anymore.
#
# NOTE: the "commits_year=2026" param on the stats card locks the commit count to 2026.
# Bump it to 2027 next January if you want the card to track the new year.
#
# REQUIRED ONE-TIME SETUP - a "STATS_TOKEN" secret:
# The automatic token GitHub gives every Action can only read the repo the workflow
# lives in. These cards need to read OTHER repos (yours and other orgs'), so you need
# to give it a real personal access token instead:
#   1. Go to https://github.com/settings/tokens -> "Generate new token (classic)".
#   2. Name it anything (e.g. "profile-stats"), no expiration or your preference.
#   3. Check the "repo" scope (the full one, not just "public_repo"). This is required
#      because count_private=true below needs to read your private repos to count
#      their commits - "public_repo" alone will NOT work for this and 104 will stay 104.
#      Security note: this means the token itself can read your private repo contents,
#      not just counts. It's only used inside your own Actions runs and stored as a
#      masked secret, but it's a bigger blast radius than public_repo if it ever leaked.
#      If you'd rather not grant that, skip this and keep count_private off - your card
#      will keep showing public commits only (104), which is still accurate, just smaller.
#   4. ALSO check the "read:user" scope. The trophy card queries GitHub's
#      contributionsCollection field, which needs read:user regardless of whether
#      "repo" is granted - "repo" and "read:user" are independent scopes, so skipping
#      this makes the trophy step fail with "Failed to fetch user info" even though
#      the other cards work fine.
#   5. Generate it and copy the token (starts with "ghp_...") - you won't see it again.
#   6. In DarkHeart01/DarkHeart01 -> Settings -> Secrets and variables -> Actions
#      -> "New repository secret".
#   7. Name: STATS_TOKEN   Value: paste the token   -> Add secret.
#   8. Re-run the workflow from the Actions tab. The cards should generate correctly now.

name: Update profile cards

on:
  schedule:
    - cron: "0 0 * * *" # runs once a day
  workflow_dispatch: # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card (includes 2026 commit count, private + public)
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=DarkHeart01&show_icons=true&theme=tokyonight&hide_border=true&commits_year=2026&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=DarkHeart01&layout=compact&theme=tokyonight&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - erp-masterdata-integration
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=DarkHeart01&repo=erp-masterdata-integration&theme=tokyonight&hide_border=true
          path: profile/pin-erp-masterdata-integration.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - General-Swarm
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=BreakingEnigmaVIT&repo=General-Swarm&theme=tokyonight&hide_border=true
          path: profile/pin-general-swarm.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - Auditor
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=ArgusPanipath&repo=Auditor&theme=tokyonight&hide_border=true
          path: profile/pin-auditor.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - TTS
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=MyMindSpace&repo=TTS&theme=tokyonight&hide_border=true
          path: profile/pin-tts.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - Realstate_allan
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=DarkHeart01&repo=Realstate_allan&theme=tokyonight&hide_border=true
          path: profile/pin-realstate-allan.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate pin - MUN_chits
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=pictmun&repo=MUN_chits&theme=tokyonight&hide_border=true
          path: profile/pin-mun-chits.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate trophy card
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: DarkHeart01
          file: profile/trophy.svg
          token: ${{ secrets.STATS_TOKEN }}
        # Optional: check this action's README for extra inputs (e.g. theme) if you
        # want the trophy colors to match tokyonight more closely.

      - name: Commit and push generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || git commit -m "chore: update profile cards"
          git push