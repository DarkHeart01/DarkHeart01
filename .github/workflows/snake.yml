# SETUP INSTRUCTIONS
# 1. In your DarkHeart01/DarkHeart01 repo, create the folder path: .github/workflows/
# 2. Save this file inside it as: .github/workflows/snake.yml
# 3. Commit and push to the "main" branch.
# 4. Go to the "Actions" tab on your repo and manually run the "generate animation" workflow once
#    (it also auto-runs daily via the schedule below).
# 5. It will create an "output" branch containing the generated SVG — this is what the
#    <img> tag in README.md under "Contribution Snake" points to. No further action needed after that.

name: generate animation

on:
  schedule:
    - cron: "0 0 * * *" # runs once a day
  workflow_dispatch: # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: DarkHeart01
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}